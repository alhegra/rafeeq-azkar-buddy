name: Build Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java (Temurin 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Install Capacitor CLI + Android
        run: npm install --no-save @capacitor/core @capacitor/cli @capacitor/android

      - name: Build web bundle (SPA for WebView)
        run: npm run build:mobile

      - name: Add Android platform
        run: npx cap add android || echo "android already added"

      - name: Sync Capacitor → Android
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Locate APK
        id: find_apk
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -n1)
          echo "Found APK: $APK"
          echo "apk=$APK" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rafeeq-azkar-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Attach APK to release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/*.apk
