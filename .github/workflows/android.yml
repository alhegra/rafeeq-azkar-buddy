name: Build Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Java (Temurin 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses >/dev/null 2>&1 || true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web bundle (SPA for WebView)
        run: bunx vite build --mode spa

      - name: Verify dist output exists
        run: |
          if [ ! -d "dist" ]; then
            echo "ERROR: dist/ not found"
            exit 1
          fi
          ls -la dist/

      - name: Add Android platform (if missing)
        run: |
          if [ ! -d "android" ]; then
            bunx cap add android
          else
            echo "android/ already present"
          fi

      - name: Copy web assets + sync plugins
        run: bunx cap sync android

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x ./gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/rafeeq-azkar-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rafeeq-azkar-debug-apk
          path: artifacts/rafeeq-azkar-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Attach APK to release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/rafeeq-azkar-debug.apk
